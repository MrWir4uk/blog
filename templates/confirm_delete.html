{% extends 'base.html' %}

{% block content %}
<div class="container mt-5 text-center">
    <div class="card shadow-sm p-4">
        <h3>Ви дійсно хочете видалити {{ type }}?</h3>
        <p class="text-muted mb-4">{{ object.title }}</p>

        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger me-2">Видалити</button>
            {% if type == 'пост' %}
                <a href="{% url 'profile' %}" class="btn btn-secondary">Відміна</a>
            {% else %}
                <a href="{% url 'my_drafts' %}" class="btn btn-secondary">Відміна</a>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
