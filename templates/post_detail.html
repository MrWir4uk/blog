{% extends 'base.html' %}

{% block content %}
<div class="post-card">
    <h1>{{ post.title }}</h1>

    <p><strong>Автор:</strong> {{ post.author.username }}</p>
    <p><strong>Категорія:</strong> {{ post.category }}</p>
    <p><strong>Статус:</strong> {{ post.status }}</p>

    {% if post.image %}
        <img src="{{ post.image.url }}" class="post-image">
    {% endif %}

    <p>{{ post.content }}</p>

    <p class="created">Створено: {{ post.created_at }}</p>

    <a href="/" class="back-link">Назад</a>
</div>
{% endblock %}

<style>
body {
    background-color: #000;
    font-family: 'Orbitron', sans-serif;
    color: #fff;
}

.post-card {
    background: rgba(20, 20, 20, 0.8);
    border: 2px solid #0ff;
    border-radius: 15px;
    padding: 25px;
    max-width: 700px;
    margin: 30px auto;
    box-shadow: 0 0 20px #0ff, 0 0 40px #0ff, 0 0 60px #0ff;
    transition: transform 0.3s, box-shadow 0.3s;
}

.post-card:hover {
    transform: scale(1.02);
    box-shadow: 0 0 30px #0ff, 0 0 60px #0ff, 0 0 90px #0ff;
}

.post-card img.post-image {
    display: block;
    width: 100%;
    height: auto;
    margin: 15px 0;
    border-radius: 10px;
    border: 2px solid #0ff;
    box-shadow: 0 0 15px #0ff;
}

.post-card a.back-link {
    color: #0ff;
    font-weight: bold;
    text-decoration: none;
    text-shadow: 0 0 5px #0ff;
}

.post-card a.back-link:hover {
    text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
}

.post-card .created {
    font-size: 0.9em;
    color: #0ff;
    text-shadow: 0 0 5px #0ff;
}
</style>
